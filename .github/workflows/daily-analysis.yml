# 평일 장 마감 후 자동 실행: 수집 → 분석 → 결과 커밋 → 알림
# cron은 UTC 기준입니다. 07:40 UTC = 16:40 KST (장 마감 15:30 이후 여유 포함)
name: daily-analysis

on:
  schedule:
    - cron: '40 7 * * 1-5'
  workflow_dispatch: # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

concurrency:
  group: analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 데이터 수집
        run: node scripts/collect.js

      - name: 스코어링 분석
        run: node scripts/analyze.js

      - name: 결과 커밋
        run: |
          git config user.name "stock-scoring-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "chore: daily analysis $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: 알림 전송
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/notify.js
